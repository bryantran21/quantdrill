<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="QuantDrill — randomized practice drills for quantitative-trading aptitude assessments: sequences, probability, orderbook arbitrage, and reflex games." />
    <title>QuantDrill — aptitude practice</title>
    <script>
      // set theme before first paint to avoid a flash of the wrong scheme
      ;(function () {
        var stored = null
        try { stored = localStorage.getItem('qd-theme') } catch (e) { /* private mode */ }
        var theme = stored || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
